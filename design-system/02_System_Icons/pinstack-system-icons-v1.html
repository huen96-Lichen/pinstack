<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PinStack System Icons v1</title>
    <link rel="stylesheet" href="../pinstack-system.css" />
  </head>
  <body>
    <main>
      <div class="shell">
        <header class="page-header">
          <div>
            <div class="eyebrow">02_System_Icons</div>
            <h1 class="title">系统图标扩展页</h1>
            <p class="lede">从 8 个核心母版延展到导航、搜索、帮助、过滤、收藏、置顶等高频入口，保持同一笔触和留白逻辑。</p>
          </div>
          <div class="pill">高频入口优先切换</div>
        </header>

        <section class="panel">
          <div class="panel-body">
            <div class="icon-gallery">
              <article class="icon-card"><div class="icon-frame"><svg viewBox="0 0 16 16" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.45"><rect x="2.5" y="2.5" width="4.5" height="4.5" rx="1.25" /><rect x="9" y="2.5" width="4.5" height="4.5" rx="1.25" /><rect x="2.5" y="9" width="4.5" height="4.5" rx="1.25" /><rect x="9" y="9" width="4.5" height="4.5" rx="1.25" /></svg></div><strong>All</strong><p>Dashboard 一级导航</p></article>
              <article class="icon-card"><div class="icon-frame"><svg viewBox="0 0 16 16" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.45"><path d="M3.5 4h9" stroke-linecap="round" /><path d="M6 4v8" stroke-linecap="round" /><path d="M5 12h3" stroke-linecap="round" /></svg></div><strong>Text</strong><p>文本导航 / 文本记录</p></article>
              <article class="icon-card"><div class="icon-frame"><svg viewBox="0 0 16 16" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.45"><rect x="2.5" y="3" width="11" height="10" rx="2" /><circle cx="5.5" cy="6" r="1" /><path d="m4 11 2.2-2.1 2.1 1.85L10.3 8 12 11" stroke-linecap="round" stroke-linejoin="round" /></svg></div><strong>Image</strong><p>图片 / 媒体导航</p></article>
              <article class="icon-card"><div class="icon-frame"><svg viewBox="0 0 16 16" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.45"><circle cx="7" cy="7" r="3.75" /><path d="m10.1 10.1 2.4 2.4" stroke-linecap="round" /></svg></div><strong>Search</strong><p>主搜索焦点</p></article>
              <article class="icon-card"><div class="icon-frame"><svg viewBox="0 0 16 16" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.45"><path d="M3 4.5h10l-4 4.5v3l-2 .75V9L3 4.5Z" stroke-linecap="round" stroke-linejoin="round" /></svg></div><strong>Filter</strong><p>二级筛选入口</p></article>
              <article class="icon-card"><div class="icon-frame"><svg viewBox="0 0 16 16" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.45"><circle cx="8" cy="8" r="5.75" /><path d="M6.7 6.4c0-.96.7-1.65 1.7-1.65 1 0 1.68.58 1.68 1.46 0 .67-.33 1.08-.9 1.45-.69.44-1 .82-1 1.55" stroke-linecap="round" /><circle cx="8" cy="11.55" r=".55" fill="currentColor" stroke="none" /></svg></div><strong>Help</strong><p>帮助 / 说明 / onboarding</p></article>
              <article class="icon-card"><div class="icon-frame"><svg viewBox="0 0 16 16" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.45"><path d="m8 2.8 1.64 3.3 3.64.53-2.64 2.58.62 3.63L8 11.1l-3.26 1.74.62-3.63L2.72 6.63l3.64-.53L8 2.8Z" stroke-linejoin="round" /></svg></div><strong>Favorite</strong><p>收藏 / 快速动作</p></article>
              <article class="icon-card"><div class="icon-frame"><svg viewBox="0 0 16 16" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.45"><path d="M8 2.5 9 6l3.5 1L9 8l-1 3.5L7 8 3.5 7 7 6 8 2.5Z" stroke-linejoin="round" /><path d="M12.5 11.5 13 13l1.5.5-1.5.5-.5 1.5-.5-1.5-1.5-.5 1.5-.5.5-1.5Z" stroke-linejoin="round" /></svg></div><strong>AI Workspace</strong><p>AI 工作区与建议操作</p></article>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
